# ─────────────────────────────────────────────────────────────────
# DICS Daily Intelligence Brief — automated PDF generation
# Triggers at 06:30 UTC daily + manual dispatch.
# ─────────────────────────────────────────────────────────────────
name: Daily Intelligence Brief

on:
  schedule:
    - cron: "30 6 * * *"             # 06:30 UTC every day
  workflow_dispatch:                  # Manual trigger

concurrency:
  group: dics-daily-brief
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: collector/package-lock.json

      # Install deps needed by the script (pg, dotenv, puppeteer, @aws-sdk/client-s3)
      - name: Install script dependencies
        working-directory: scripts
        run: |
          npm init -y > /dev/null 2>&1
          npm install pg dotenv puppeteer @aws-sdk/client-s3

      # Also install collector deps so pg resolves from NODE_PATH if needed
      - name: Install collector dependencies
        working-directory: collector
        run: npm ci

      - name: Generate Daily Brief PDF
        working-directory: scripts
        timeout-minutes: 10
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: "dics-reports"
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: node generate-daily-pdf.js

      # Upload PDF as build artifact (available for 30 days even without R2)
      - name: Upload PDF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dics-daily-brief
          path: output/dics-brief-*.pdf
          retention-days: 30
          if-no-files-found: warn

      # Also upload HTML version
      - name: Upload HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dics-daily-brief-html
          path: output/dics-brief-*.html
          retention-days: 30
          if-no-files-found: warn
