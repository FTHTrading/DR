version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: dics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: dics
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./shared/db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dics"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dics-redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: dics-collector
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dics:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dics
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      COLLECTOR_USER_AGENT: ${COLLECTOR_USER_AGENT:-DICS-Collector/1.0}
      RESPECT_ROBOTS_TXT: "true"
      FETCH_TIMEOUT_MS: "15000"
    volumes:
      - ./config:/app/config:ro
    ports:
      - "9091:9091"

  extractor:
    build:
      context: ./extractor
      dockerfile: Dockerfile
    container_name: dics-extractor
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dics:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dics
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EXTRACTOR_POLL_SECONDS: "30"
      LOG_LEVEL: ${LOG_LEVEL:-info}

volumes:
  postgres-data:
  redis-data:
