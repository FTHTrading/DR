version: "3.9"

# ────────────────────────────────────────────────────────────────────────
# DICS Docker Compose
#
# Two modes:
#   LOCAL:  docker compose up                  → uses local Postgres + Redis
#   NEON:   docker compose --profile neon up   → uses Neon (set DATABASE_URL in .env)
#
# For Neon mode, the postgres service is skipped; collector + extractor read
# DATABASE_URL from the .env file at the project root.
# ────────────────────────────────────────────────────────────────────────

services:

  # ── Local Postgres (only for local mode) ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dics-postgres
    restart: unless-stopped
    profiles: ["local"]
    environment:
      POSTGRES_USER: dics
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: dics
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./shared/db:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dics"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dics-redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Collector (Neon mode — reads DATABASE_URL from .env) ──────────────
  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: dics-collector
    restart: unless-stopped
    profiles: ["neon"]
    depends_on:
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      COLLECTOR_USER_AGENT: ${COLLECTOR_USER_AGENT:-DICS-Collector/1.0 (+https://dr.optkas.org/bot)}
      RESPECT_ROBOTS_TXT: "true"
      FETCH_TIMEOUT_MS: "15000"
    volumes:
      - ./config:/app/config:ro
    ports:
      - "9091:9091"

  extractor:
    build:
      context: ./extractor
      dockerfile: Dockerfile
    container_name: dics-extractor
    restart: unless-stopped
    profiles: ["neon"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EXTRACTOR_POLL_SECONDS: "30"
      LOG_LEVEL: ${LOG_LEVEL:-info}

  # ── Collector (local mode — uses local Postgres) ──────────────────────
  collector-local:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: dics-collector-local
    restart: unless-stopped
    profiles: ["local"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dics:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dics
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      COLLECTOR_USER_AGENT: ${COLLECTOR_USER_AGENT:-DICS-Collector/1.0}
      RESPECT_ROBOTS_TXT: "true"
      FETCH_TIMEOUT_MS: "15000"
    volumes:
      - ./config:/app/config:ro
    ports:
      - "9091:9091"

  extractor-local:
    build:
      context: ./extractor
      dockerfile: Dockerfile
    container_name: dics-extractor-local
    restart: unless-stopped
    profiles: ["local"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dics:${POSTGRES_PASSWORD:-changeme}@postgres:5432/dics
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      EXTRACTOR_POLL_SECONDS: "30"
      LOG_LEVEL: ${LOG_LEVEL:-info}

volumes:
  postgres-data:
  redis-data:
