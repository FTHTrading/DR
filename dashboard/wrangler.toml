# DICS — Cloudflare Workers deployment via OpenNext
# dr.optkas.org — Sovereign Infrastructure Intelligence

name = "dics-dr"
main = ".open-next/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Custom domain route
routes = [
  { pattern = "dr.optkas.org/*", zone_id = "8b9c42656c1bd741127d676105a11eac" }
]

# Assets
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Environment variables for production
# DATABASE_URL is set via Cloudflare dashboard (encrypted)
